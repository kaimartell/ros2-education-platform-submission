name: Deploy PyScript site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug repo contents
        run: |
          echo "PWD:"
          pwd
          echo
          echo "TOP LEVEL:"
          ls -la
          echo
          echo "TREE:"
          find . -maxdepth 3 | sort

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Verify site folder
        run: |
          test -f pyscript/index.html
          touch pyscript/.nojekyll
          ls -la pyscript

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pyscript

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4