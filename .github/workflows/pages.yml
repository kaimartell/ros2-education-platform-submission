name: Deploy PyScript site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug repo contents
        run: |
          pwd
          ls -la
          echo "---- Pyscript ----"
          ls -la Pyscript
          echo "---- files ----"
          find Pyscript -maxdepth 3 -type f | sort

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Verify site folder
        run: |
          test -f Pyscript/index.html
          touch Pyscript/.nojekyll
          ls -la Pyscript

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Pyscript

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4